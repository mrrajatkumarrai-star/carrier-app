<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Carrier CRM Pro</title>

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
:root{
  --bg1:#e7ebf0; --bg2:#f6f8fb;
  --glass: rgba(255,255,255,0.55);
  --border: rgba(0,0,0,0.08);
  --text:#1f2937;
  --muted:#6b7280;
  --accent:#3b82f6;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family: Calibri, Arial, sans-serif;
  font-size:10pt;
  color:var(--text);
  background: linear-gradient(135deg,var(--bg1),var(--bg2));
}

.header{
  background:#2f3542;
  color:#fff;
  padding:10px 14px;
  font-weight:600;
  letter-spacing:.3px;
}

.container{padding:12px; max-width:1400px; margin:0 auto;}

.glass{
  background: var(--glass);
  backdrop-filter: blur(10px);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  margin-bottom:10px;
}

.row{display:flex; flex-wrap:wrap; gap:6px; align-items:center;}

input{
  height:24px;
  padding:3px 6px;
  border:1px solid #cfd6e0;
  border-radius:6px;
  outline:none;
  min-width:140px;
}
input:focus{border-color:var(--accent)}

button{
  height:26px;
  padding:0 10px;
  border:none;
  border-radius:6px;
  background:#4b5563;
  color:#fff;
  cursor:pointer;
}
button.secondary{background:#9ca3af;color:#111827}
button.primary{background:#2563eb}
button:disabled{opacity:.6;cursor:not-allowed}

.status{
  margin-left:10px;
  font-weight:600;
  color:#065f46;
}

.table-wrap{
  overflow:auto;
  max-height:65vh;
  border-radius:8px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  border:1px solid #d7dee8;
  padding:3px 6px;
  white-space:nowrap;
  vertical-align:middle;
}

th{
  position:sticky; top:0;
  background:#e9edf5;
  font-weight:600;
  cursor:pointer;
  z-index:1;
}

tr:nth-child(even){background:rgba(255,255,255,0.4)}
tr:hover{background:#eef3ff}

.filters input{
  width:95%;
  font-size:9pt;
  margin-top:3px;
}

.actions{
  text-align:center;
  width:120px;
}

.icon-btn{
  border:none;
  background:none;
  cursor:pointer;
  margin:0 2px;
  font-size:14px;
}
.icon-copy{color:#3742fa}
.icon-wa{color:#25D366}
.icon-edit{color:#111827}
.icon-del{color:#dc2626}
.icon-dl{color:#0ea5e9}
</style>
</head>

<body>
<div class="header">Carrier CRM Pro</div>

<div class="container">

  <!-- FORM -->
  <div class="glass">
    <div class="row">
      <input id="carrier" placeholder="Carrier">
      <input id="location" placeholder="Location">
      <input id="pic" placeholder="PIC">
      <input id="email" placeholder="Email">
      <input id="contact" placeholder="Contact">
      <input id="remarks" placeholder="Remarks" style="min-width:220px">

      <button class="primary" id="btnSave">Save</button>
      <button id="btnUpdate">Update</button>
      <button class="secondary" id="btnClear">Clear</button>
      <button id="btnExportAll">Export VCF</button>

      <span id="status" class="status"></span>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="glass">
    <div class="row">
      <input id="searchAll" placeholder="Search all fields">
      <input id="fCarrier" placeholder="Carrier filter">
      <input id="fLocation" placeholder="Location filter">
      <input id="fPic" placeholder="PIC filter">
      <input id="fEmail" placeholder="Email filter">
      <input id="fContact" placeholder="Contact filter">
      <input id="fRemarks" placeholder="Remarks filter">
    </div>
  </div>

  <!-- TABLE -->
  <div class="glass table-wrap">
    <table>
      <thead>
        <tr>
          <th data-key="carrier">Carrier</th>
          <th data-key="location">Location</th>
          <th data-key="pic">PIC</th>
          <th data-key="email">Email</th>
          <th data-key="contact">Contact</th>
          <th data-key="remarks">Remarks</th>
          <th class="actions">Action</th>
        </tr>
        <tr class="filters">
          <th><input data-col="carrier"></th>
          <th><input data-col="location"></th>
          <th><input data-col="pic"></th>
          <th><input data-col="email"></th>
          <th><input data-col="contact"></th>
          <th><input data-col="remarks"></th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<script type="module">
/* ================= FIREBASE ================= */
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBy7H5e9924bwSMJmsDTLBfgeUu2ofsuKc",
  authDomain: "c-rm-85c7c.firebaseapp.com",
  projectId: "c-rm-85c7c",
  storageBucket: "c-rm-85c7c.appspot.com",
  messagingSenderId: "527591400910",
  appId: "1:527591400910:web:07289d3360072a2b53f79f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ================= STATE ================= */
const state = {
  data: [],
  view: [],
  editId: null,
  sortKey: null,
  sortDir: 1
};

/* ================= HELPERS ================= */
const $ = id => document.getElementById(id);

function normalize(v){ return (v||"").toLowerCase().trim(); }
function normalizePhone(v){ return (v||"").replace(/\D/g,''); }

function setStatus(msg){
  $("status").textContent = msg;
  setTimeout(()=> $("status").textContent = "", 1800);
}

function getForm(){
  return {
    carrier: $("carrier").value.trim(),
    location: $("location").value.trim(),
    pic: $("pic").value.trim(),
    email: $("email").value.trim(),
    contact: $("contact").value.trim(),
    remarks: $("remarks").value.trim()
  };
}

function clearForm(){
  ["carrier","location","pic","email","contact","remarks"].forEach(id => $(id).value="");
  state.editId = null;
}

function validate(d){
  if(!d.carrier || !d.location){
    setStatus("Carrier & Location required");
    return false;
  }
  return true;
}

function isDuplicate(d){
  return state.data.some(r =>
    normalize(r.carrier) === normalize(d.carrier) &&
    normalize(r.location) === normalize(d.location) &&
    normalizePhone(r.contact) === normalizePhone(d.contact)
  );
}

function copyText(t){ navigator.clipboard.writeText(t||""); }

function openWhatsApp(n){
  const num = (n||"").replace(/\D/g,'');
  if(!num) return;
  window.open(`https://wa.me/${num}`, "_blank");
}

function vcfFrom(r){
  return `BEGIN:VCARD
VERSION:3.0
FN:${r.pic||""}
ORG:${r.carrier||""}
TEL:${r.contact||""}
EMAIL:${r.email||""}
END:VCARD`;
}

function download(name, text){
  const blob = new Blob([text], {type:"text/vcard"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
}

/* ================= DATA ================= */
async function load(){
  const snap = await getDocs(collection(db, "contacts"));
  state.data = [];
  snap.forEach(d => state.data.push({id:d.id, ...d.data()}));
  state.view = [...state.data];
  render();
}

/* ================= RENDER ================= */
function render(){
  const tbody = $("tbody");
  let html = "";

  state.view.forEach(r=>{
    html += `
      <tr>
        <td>${r.carrier||""}</td>
        <td>${r.location||""}</td>
        <td>${r.pic||""}</td>
        <td>
          ${r.email||""}
          <button class="icon-btn icon-copy" data-copy="${r.email||""}"><i class="bi bi-copy"></i></button>
        </td>
        <td>
          ${r.contact||""}
          <button class="icon-btn icon-copy" data-copy="${r.contact||""}"><i class="bi bi-copy"></i></button>
          <button class="icon-btn icon-wa" data-wa="${r.contact||""}"><i class="bi bi-whatsapp"></i></button>
        </td>
        <td>${r.remarks||""}</td>
        <td class="actions">
          <button class="icon-btn icon-edit" data-edit="${r.id}"><i class="bi bi-pencil"></i></button>
          <button class="icon-btn icon-del" data-del="${r.id}"><i class="bi bi-trash"></i></button>
          <button class="icon-btn icon-dl" data-vcf="${r.id}"><i class="bi bi-download"></i></button>
        </td>
      </tr>`;
  });

  tbody.innerHTML = html;
}

/* ================= EVENTS ================= */

// Event delegation (no inline onclick)
document.body.addEventListener("click", async (e)=>{
  const t = e.target.closest("button");
  if(!t) return;

  if(t.dataset.copy !== undefined){
    copyText(t.dataset.copy);
    setStatus("Copied");
  }

  if(t.dataset.wa !== undefined){
    openWhatsApp(t.dataset.wa);
  }

  if(t.dataset.edit){
    const r = state.data.find(x=>x.id===t.dataset.edit);
    if(!r) return;
    state.editId = r.id;
    $("carrier").value = r.carrier||"";
    $("location").value = r.location||"";
    $("pic").value = r.pic||"";
    $("email").value = r.email||"";
    $("contact").value = r.contact||"";
    $("remarks").value = r.remarks||"";
    setStatus("Editing");
  }

  if(t.dataset.del){
    await deleteDoc(doc(db, "contacts", t.dataset.del));
    setStatus("Deleted");
    await load();
  }

  if(t.dataset.vcf){
    const r = state.data.find(x=>x.id===t.dataset.vcf);
    if(r) download("contact.vcf", vcfFrom(r));
  }
});

// Save
$("btnSave").addEventListener("click", async ()=>{
  const d = getForm();
  if(!validate(d)) return;
  if(isDuplicate(d)){
    setStatus("Duplicate exists");
    return;
  }
  await addDoc(collection(db,"contacts"), d);
  clearForm();
  setStatus("Saved");
  await load();
});

// Update
$("btnUpdate").addEventListener("click", async ()=>{
  if(!state.editId){
    setStatus("Select a record first");
    return;
  }
  const d = getForm();
  if(!validate(d)) return;
  await updateDoc(doc(db,"contacts", state.editId), d);
  clearForm();
  setStatus("Updated");
  await load();
});

// Clear
$("btnClear").addEventListener("click", ()=>{
  clearForm();
  setStatus("Cleared");
});

// Export all
$("btnExportAll").addEventListener("click", ()=>{
  let all = "";
  state.data.forEach(r => all += vcfFrom(r) + "\n");
  download("all_contacts.vcf", all);
});

/* ================= SEARCH / FILTER / SORT ================= */

// Global search
$("searchAll").addEventListener("input", (e)=>{
  const v = e.target.value.toLowerCase();
  state.view = state.data.filter(r =>
    Object.values(r).join(" ").toLowerCase().includes(v)
  );
  render();
});

// Column filters (top inputs)
["fCarrier","fLocation","fPic","fEmail","fContact","fRemarks"].forEach((id, idx)=>{
  $(id).addEventListener("input", applyFilters);
});

// Header row filters
document.querySelectorAll(".filters input").forEach(inp=>{
  inp.addEventListener("input", applyFilters);
});

function applyFilters(){
  const vals = {
    carrier: $("fCarrier").value.toLowerCase(),
    location: $("fLocation").value.toLowerCase(),
    pic: $("fPic").value.toLowerCase(),
    email: $("fEmail").value.toLowerCase(),
    contact: $("fContact").value.toLowerCase(),
    remarks: $("fRemarks").value.toLowerCase()
  };

  // merge with header inputs
  document.querySelectorAll(".filters input").forEach(inp=>{
    const k = inp.dataset.col;
    if(inp.value) vals[k] = inp.value.toLowerCase();
  });

  state.view = state.data.filter(r=>{
    return (!vals.carrier || (r.carrier||"").toLowerCase().includes(vals.carrier)) &&
           (!vals.location || (r.location||"").toLowerCase().includes(vals.location)) &&
           (!vals.pic || (r.pic||"").toLowerCase().includes(vals.pic)) &&
           (!vals.email || (r.email||"").toLowerCase().includes(vals.email)) &&
           (!vals.contact || (r.contact||"").toLowerCase().includes(vals.contact)) &&
           (!vals.remarks || (r.remarks||"").toLowerCase().includes(vals.remarks));
  });

  render();
}

// Sorting
document.querySelectorAll("th[data-key]").forEach(th=>{
  th.addEventListener("click", ()=>{
    const key = th.dataset.key;
    if(state.sortKey === key) state.sortDir *= -1;
    else { state.sortKey = key; state.sortDir = 1; }

    state.view.sort((a,b)=>{
      const A = (a[key]||"").toString().toLowerCase();
      const B = (b[key]||"").toString().toLowerCase();
      return A.localeCompare(B) * state.sortDir;
    });
    render();
  });
});

/* ================= INIT ================= */
load();

</script>
</body>
</html>
