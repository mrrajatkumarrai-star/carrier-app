<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>CRM</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
:root{
  --bg1:#e7ebf0; --bg2:#f6f8fb;
  --glass: rgba(255,255,255,0.55);
  --border: rgba(0,0,0,0.08);
  --text:#1f2937;
  --accent:#3b82f6;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family: Calibri, Arial, sans-serif;
  font-size:10pt;
  color:var(--text);
  background: linear-gradient(135deg,var(--bg1),var(--bg2));
}

/* FULL WIDTH */
.container{
  padding:12px;
  width:100%;
  max-width:100%;
}

.glass{
  background: var(--glass);
  backdrop-filter: blur(10px);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  margin-bottom:10px;
}

.row{display:flex; flex-wrap:wrap; gap:6px; align-items:center;}

input{
  height:24px;
  padding:3px 6px;
  border:1px solid #cfd6e0;
  border-radius:6px;
  outline:none;
  min-width:140px;

  /* FORCE CAPS (VISUAL BACKUP) */
  text-transform: uppercase;
}

input:focus{border-color:var(--accent)}

button{
  height:26px;
  padding:0 10px;
  border:none;
  border-radius:6px;
  background:#4b5563;
  color:#fff;
  cursor:pointer;
}

button.primary{background:#2563eb}
button.secondary{background:#9ca3af;color:#111827}

.status{
  margin-left:10px;
  font-weight:600;
  color:#065f46;
}

.table-wrap{
  overflow:auto;
  max-height:70vh;
  border-radius:8px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  border:1px solid #d7dee8;
  padding:3px 6px;
  white-space:nowrap;
}

th{
  position:sticky;
  top:0;
  background:#e9edf5;
  cursor:pointer;
}

tr:nth-child(even){background:rgba(255,255,255,0.4)}
tr:hover{background:#eef3ff}

.filters input{
  width:95%;
  font-size:9pt;
}

.actions{width:120px; text-align:center;}

.icon-btn{
  border:none;
  background:none;
  cursor:pointer;
  margin:0 2px;
  font-size:14px;
}

.icon-copy{color:#3742fa}
.icon-wa{color:#25D366}
.icon-edit{color:#111827}
.icon-del{color:#dc2626}
.icon-dl{color:#0ea5e9}
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="glass">
<div class="row">
<input id="carrier" placeholder="CARRIER">
<input id="location" placeholder="LOCATION">
<input id="pic" placeholder="PIC">
<input id="email" placeholder="EMAIL">
<input id="contact" placeholder="CONTACT">
<input id="remarks" placeholder="REMARKS" style="min-width:220px">

<button class="primary" id="btnSave">SAVE</button>
<button id="btnUpdate">UPDATE</button>
<button class="secondary" id="btnClear">CLEAR</button>
<button id="btnExportAll">EXPORT VCF</button>

<span id="status" class="status"></span>
</div>
</div>

<!-- SEARCH -->
<div class="glass">
<div class="row">
<input id="searchAll" placeholder="SEARCH">
<input id="fCarrier" placeholder="CARRIER FILTER">
<input id="fLocation" placeholder="LOCATION FILTER">
<input id="fPic" placeholder="PIC FILTER">
<input id="fEmail" placeholder="EMAIL FILTER">
<input id="fContact" placeholder="CONTACT FILTER">
<input id="fRemarks" placeholder="REMARKS FILTER">
</div>
</div>

<!-- TABLE -->
<div class="glass table-wrap">
<table>
<thead>
<tr>
<th data-key="carrier">CARRIER</th>
<th data-key="location">LOCATION</th>
<th data-key="pic">PIC</th>
<th data-key="email">EMAIL</th>
<th data-key="contact">CONTACT</th>
<th data-key="remarks">REMARKS</th>
<th class="actions">ACTION</th>
</tr>

<tr class="filters">
<th><input data-col="carrier"></th>
<th><input data-col="location"></th>
<th><input data-col="pic"></th>
<th><input data-col="email"></th>
<th><input data-col="contact"></th>
<th><input data-col="remarks"></th>
<th></th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBy7H5e9924bwSMJmsDTLBfgeUu2ofsuKc",
  authDomain: "c-rm-85c7c.firebaseapp.com",
  projectId: "c-rm-85c7c"
});

const db = getFirestore(app);

const state = { data:[], view:[], editId:null };

/* AUTO CAPS (REAL LOGIC) */
document.querySelectorAll("input").forEach(inp=>{
  inp.addEventListener("input", ()=>{
    inp.value = inp.value.toUpperCase();
  });
});

function getForm(){
  return {
    carrier: carrier.value,
    location: location.value,
    pic: pic.value,
    email: email.value,
    contact: contact.value,
    remarks: remarks.value
  };
}

function clearForm(){
  document.querySelectorAll("input").forEach(i=>i.value="");
  state.editId=null;
}

async function load(){
  const snap = await getDocs(collection(db,"contacts"));
  state.data=[];
  snap.forEach(d=> state.data.push({id:d.id,...d.data()}));
  state.view=[...state.data];
  render();
}

function render(){
  tbody.innerHTML = state.view.map(r=>`
<tr>
<td>${r.carrier||""}</td>
<td>${r.location||""}</td>
<td>${r.pic||""}</td>
<td>${r.email||""}</td>
<td>${r.contact||""}</td>
<td>${r.remarks||""}</td>
<td class="actions">
<button data-edit="${r.id}">✏️</button>
<button data-del="${r.id}">🗑️</button>
</td>
</tr>`).join("");
}

document.body.addEventListener("click", async e=>{
  const t = e.target;

  if(t.dataset.edit){
    const r = state.data.find(x=>x.id===t.dataset.edit);
    Object.keys(r).forEach(k=>{
      if(document.getElementById(k)) document.getElementById(k).value=r[k];
    });
    state.editId=r.id;
  }

  if(t.dataset.del){
    await deleteDoc(doc(db,"contacts",t.dataset.del));
    load();
  }
});

btnSave.onclick = async ()=>{
  await addDoc(collection(db,"contacts"), getForm());
  clearForm();
  load();
};

btnUpdate.onclick = async ()=>{
  if(!state.editId) return;
  await updateDoc(doc(db,"contacts",state.editId), getForm());
  clearForm();
  load();
};

btnClear.onclick = clearForm;

load();

</script>
</body>
</html>
