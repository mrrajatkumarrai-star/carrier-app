<!DOCTYPE html>
<html>
<head>
  <title>Carrier App</title>

  <style>
    body {
      font-family: Calibri;
      font-size: 10pt;
      background: linear-gradient(135deg,#e6eef8,#ffffff);
      padding:20px;
    }

    .glass {
      background: rgba(255,255,255,0.3);
      backdrop-filter: blur(10px);
      padding:15px;
      border-radius:10px;
      margin-bottom:15px;
    }

    input {
      margin:5px;
      padding:5px;
      width:200px;
    }

    button {
      padding:5px 10px;
      background:#007bff;
      color:white;
      border:none;
      cursor:pointer;
    }

    table {
      width:100%;
      border-collapse: collapse;
    }

    th, td {
      border:1px solid #ccc;
      padding:5px;
    }

    th {
      background:#007bff;
      color:white;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="glass">
  <h3>Enter PIN</h3>
  <input type="password" id="pin">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="glass">
<h3>Add Contact</h3>

<input id="carrier" placeholder="Carrier">
<input id="location" placeholder="Location"><br>

<input id="pic" placeholder="PIC">
<input id="email" placeholder="Email"><br>

<input id="contact" placeholder="Contact">
<input id="remarks" placeholder="Remarks"><br>

<button onclick="add()">Save</button>
</div>

<div class="glass">
<h3>Records</h3>
<div id="data"></div>
</div>

</div>

<!-- ✅ FIREBASE (WORKING VERSION) -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// 🔴 YOUR FIREBASE CONFIG (already correct)
const firebaseConfig = {
  apiKey: "AIzaSyBy7H5e9924bwSMJmsDTLBfgeUu2ofsuKc",
  authDomain: "c-rm-85c7c.firebaseapp.com",
  projectId: "c-rm-85c7c",
  storageBucket: "c-rm-85c7c.appspot.com",
  messagingSenderId: "527591400910",
  appId: "1:527591400910:web:07289d3360072a2b53f79f"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// LOGIN
window.login = function() {
  if (document.getElementById("pin").value === "1234") {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    load();
  } else {
    alert("Wrong PIN");
  }
};

// SAVE DATA
window.add = async function() {
  await addDoc(collection(db, "contacts"), {
    carrier: document.getElementById("carrier").value,
    location: document.getElementById("location").value,
    pic: document.getElementById("pic").value,
    email: document.getElementById("email").value,
    contact: document.getElementById("contact").value,
    remarks: document.getElementById("remarks").value
  });

  clearForm();
  load();
};

// LOAD DATA
async function load() {
  const snap = await getDocs(collection(db, "contacts"));

  let html = "<table><tr>\
  <th>Carrier</th><th>Location</th><th>PIC</th>\
  <th>Email</th><th>Contact</th><th>Remarks</th><th>Action</th></tr>";

  snap.forEach(docSnap => {
    const d = docSnap.data();

    html += `<tr>
      <td>${d.carrier || ""}</td>
      <td>${d.location || ""}</td>
      <td>${d.pic || ""}</td>
      <td>${d.email || ""}</td>
      <td>${d.contact || ""}</td>
      <td>${d.remarks || ""}</td>
      <td><button onclick="del('${docSnap.id}')">Delete</button></td>
    </tr>`;
  });

  html += "</table>";

  document.getElementById("data").innerHTML = html;
}

// DELETE
window.del = async function(id) {
  await deleteDoc(doc(db, "contacts", id));
  load();
};

// CLEAR FORM
function clearForm() {
  document.getElementById("carrier").value = "";
  document.getElementById("location").value = "";
  document.getElementById("pic").value = "";
  document.getElementById("email").value = "";
  document.getElementById("contact").value = "";
  document.getElementById("remarks").value = "";
}

</script>

</body>
</html>
