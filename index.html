<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRM</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
:root{
  --bg1:#e7ebf0; --bg2:#f6f8fb;
  --glass: rgba(255,255,255,0.55);
  --border: rgba(0,0,0,0.08);
  --text:#1f2937;
  --accent:#3b82f6;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family: Calibri, Arial, sans-serif;
  font-size:10pt;
  color:var(--text);
  background: linear-gradient(135deg,var(--bg1),var(--bg2));
}

/* FULL WIDTH */
.container{
  padding:12px;
  width:100%;
  max-width:100%;
}

.glass{
  background: var(--glass);
  backdrop-filter: blur(10px);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  margin-bottom:10px;
}

.row{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  align-items:center;
}

/* INPUT AUTO CAPS */
input{
  height:24px;
  padding:3px 6px;
  border:1px solid #cfd6e0;
  border-radius:6px;
  outline:none;
  min-width:140px;
  text-transform: uppercase;
}

input:focus{border-color:var(--accent)}

button{
  height:26px;
  padding:0 10px;
  border:none;
  border-radius:6px;
  background:#4b5563;
  color:#fff;
  cursor:pointer;
}

button.secondary{background:#9ca3af;color:#111827}
button.primary{background:#2563eb}

.status{
  margin-left:10px;
  font-weight:600;
  color:#065f46;
}

.table-wrap{
  overflow:auto;
  max-height:70vh;
  border-radius:8px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th, td{
  border:1px solid #d7dee8;
  padding:3px 6px;
  white-space:nowrap;
}

th{
  position:sticky;
  top:0;
  background:#e9edf5;
  font-weight:600;
  cursor:pointer;
}

tr:nth-child(even){background:rgba(255,255,255,0.4)}
tr:hover{background:#eef3ff}

.filters input{
  width:95%;
  font-size:9pt;
  margin-top:3px;
}

.actions{
  text-align:center;
  width:120px;
}

.icon-btn{
  border:none;
  background:none;
  cursor:pointer;
  margin:0 2px;
  font-size:14px;
}

.icon-copy{color:#3742fa}
.icon-wa{color:#25D366}
.icon-edit{color:#111827}
.icon-del{color:#dc2626}
.icon-dl{color:#0ea5e9}
</style>
</head>

<body>

<div class="container">

  <!-- FORM -->
  <div class="glass">
    <div class="row">
      <input id="carrier" placeholder="CARRIER">
      <input id="location" placeholder="LOCATION">
      <input id="pic" placeholder="PIC">
      <input id="email" placeholder="EMAIL">
      <input id="contact" placeholder="CONTACT">
      <input id="remarks" placeholder="REMARKS" style="min-width:220px">

      <button class="primary" id="btnSave">SAVE</button>
      <button id="btnUpdate">UPDATE</button>
      <button class="secondary" id="btnClear">CLEAR</button>
      <button id="btnExportAll">EXPORT VCF</button>

      <span id="status" class="status"></span>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="glass">
    <div class="row">
      <input id="searchAll" placeholder="SEARCH ALL">
      <input id="fCarrier" placeholder="CARRIER FILTER">
      <input id="fLocation" placeholder="LOCATION FILTER">
      <input id="fPic" placeholder="PIC FILTER">
      <input id="fEmail" placeholder="EMAIL FILTER">
      <input id="fContact" placeholder="CONTACT FILTER">
      <input id="fRemarks" placeholder="REMARKS FILTER">
    </div>
  </div>

  <!-- TABLE -->
  <div class="glass table-wrap">
    <table>
      <thead>
        <tr>
          <th data-key="carrier">CARRIER</th>
          <th data-key="location">LOCATION</th>
          <th data-key="pic">PIC</th>
          <th data-key="email">EMAIL</th>
          <th data-key="contact">CONTACT</th>
          <th data-key="remarks">REMARKS</th>
          <th class="actions">ACTION</th>
        </tr>
        <tr class="filters">
          <th><input data-col="carrier"></th>
          <th><input data-col="location"></th>
          <th><input data-col="pic"></th>
          <th><input data-col="email"></th>
          <th><input data-col="contact"></th>
          <th><input data-col="remarks"></th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBy7H5e9924bwSMJmsDTLBfgeUu2ofsuKc",
  authDomain: "c-rm-85c7c.firebaseapp.com",
  projectId: "c-rm-85c7c",
  storageBucket: "c-rm-85c7c.appspot.com",
  messagingSenderId: "527591400910",
  appId: "1:527591400910:web:07289d3360072a2b53f79f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const state = {
  data: [],
  view: [],
  editId: null
};

const $ = id => document.getElementById(id);

/* FORCE CAPS (JS LAYER) */
function forceUppercase(el){
  el.value = el.value.toUpperCase();
}

document.querySelectorAll("input").forEach(inp=>{
  inp.addEventListener("input", ()=> forceUppercase(inp));
});

/* HELPERS */
function setStatus(msg){
  $("status").textContent = msg;
  setTimeout(()=> $("status").textContent = "", 1800);
}

function getForm(){
  return {
    carrier: $("carrier").value.trim(),
    location: $("location").value.trim(),
    pic: $("pic").value.trim(),
    email: $("email").value.trim(),
    contact: $("contact").value.trim(),
    remarks: $("remarks").value.trim()
  };
}

function clearForm(){
  ["carrier","location","pic","email","contact","remarks"].forEach(id => $(id).value="");
  state.editId = null;
}

function validate(d){
  if(!d.carrier || !d.location){
    setStatus("CARRIER & LOCATION REQUIRED");
    return false;
  }
  return true;
}

/* DATA */
async function load(){
  const snap = await getDocs(collection(db, "contacts"));
  state.data = [];
  snap.forEach(d => state.data.push({id:d.id, ...d.data()}));
  state.view = [...state.data];
  render();
}

/* RENDER */
function render(){
  const tbody = $("tbody");
  let html = "";

  state.view.forEach(r=>{
    html += `
      <tr>
        <td>${r.carrier||""}</td>
        <td>${r.location||""}</td>
        <td>${r.pic||""}</td>
        <td>${r.email||""}</td>
        <td>${r.contact||""}</td>
        <td>${r.remarks||""}</td>
        <td class="actions">
          <button data-edit="${r.id}">✏</button>
          <button data-del="${r.id}">🗑</button>
        </td>
      </tr>`;
  });

  tbody.innerHTML = html;
}

/* EVENTS */
document.body.addEventListener("click", async (e)=>{
  const t = e.target.closest("button");
  if(!t) return;

  if(t.dataset.edit){
    const r = state.data.find(x=>x.id===t.dataset.edit);
    if(!r) return;

    state.editId = r.id;
    $("carrier").value = r.carrier||"";
    $("location").value = r.location||"";
    $("pic").value = r.pic||"";
    $("email").value = r.email||"";
    $("contact").value = r.contact||"";
    $("remarks").value = r.remarks||"";

    setStatus("EDITING");
  }

  if(t.dataset.del){
    await deleteDoc(doc(db, "contacts", t.dataset.del));
    setStatus("DELETED");
    await load();
  }
});

/* SAVE */
$("btnSave").addEventListener("click", async ()=>{
  const d = getForm();
  if(!validate(d)) return;

  await addDoc(collection(db,"contacts"), d);
  clearForm();
  setStatus("SAVED");
  await load();
});

/* UPDATE */
$("btnUpdate").addEventListener("click", async ()=>{
  if(!state.editId){
    setStatus("SELECT RECORD FIRST");
    return;
  }

  const d = getForm();
  if(!validate(d)) return;

  await updateDoc(doc(db,"contacts", state.editId), d);
  clearForm();
  setStatus("UPDATED");
  await load();
});

/* CLEAR */
$("btnClear").addEventListener("click", ()=>{
  clearForm();
  setStatus("CLEARED");
});

/* SEARCH */
$("searchAll").addEventListener("input", (e)=>{
  const v = e.target.value.toLowerCase();
  state.view = state.data.filter(r =>
    Object.values(r).join(" ").toLowerCase().includes(v)
  );
  render();
});

/* INIT */
load();

</script>
</body>
</html>
