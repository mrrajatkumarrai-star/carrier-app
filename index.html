<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRM</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
:root{
  --bg1:#e7ebf0; --bg2:#f6f8fb;
  --glass: rgba(255,255,255,0.55);
  --border: rgba(0,0,0,0.08);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family: Calibri, Arial;
  font-size:10pt;
  background: linear-gradient(135deg,var(--bg1),var(--bg2));
}

.container{padding:10px;width:100%}

.glass{
  background: var(--glass);
  backdrop-filter: blur(10px);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  margin-bottom:10px;
}

.row{display:flex;flex-wrap:wrap;gap:6px}

input{
  height:30px;
  padding:5px;
  border:1px solid #cfd6e0;
  border-radius:6px;
  flex:1;
  text-transform: uppercase;
}

button{
  height:32px;
  padding:0 10px;
  border:none;
  border-radius:6px;
  background:#4b5563;
  color:#fff;
  cursor:pointer;
}
button.primary{background:#2563eb}
button.secondary{background:#9ca3af;color:#111}

.table-wrap{overflow:auto;max-height:70vh}

table{width:100%;border-collapse:collapse;font-size:9pt}
th,td{border:1px solid #d7dee8;padding:5px;white-space:nowrap}
th{position:sticky;top:0;background:#e9edf5}

.actions{text-align:center;width:120px}

.icon-btn{
  border:none;background:none;cursor:pointer;margin:0 2px;font-size:14px;
}
.icon-copy{color:#3742fa}
.icon-wa{color:#25D366}
.icon-edit{color:#111}
.icon-del{color:#dc2626}
.icon-dl{color:#0ea5e9}

@media(max-width:768px){
  .row{flex-direction:column}
  button{width:100%}
}
</style>
</head>

<body>
<div class="container">

<div class="glass">
<div class="row">
<input id="carrier" placeholder="CARRIER">
<input id="location" placeholder="LOCATION">
<input id="pic" placeholder="PIC">
<input id="email" placeholder="EMAIL">
<input id="contact" placeholder="CONTACT">
<input id="remarks" placeholder="REMARKS">

<button class="primary" id="btnSave">SAVE</button>
<button id="btnUpdate">UPDATE</button>
<button class="secondary" id="btnClear">CLEAR</button>
<button id="btnExportAll">EXPORT VCF</button>
</div>

<div class="row" style="margin-top:6px;">
<input type="file" id="excelUpload">
<button id="btnUploadExcel">UPLOAD EXCEL</button>
</div>

<span id="status"></span>
</div>

<div class="glass table-wrap">
<table>
<thead>
<tr>
<th>CARRIER</th>
<th>LOCATION</th>
<th>PIC</th>
<th>EMAIL</th>
<th>CONTACT</th>
<th>REMARKS</th>
<th>ACTION</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSy...",
  authDomain:"c-rm-85c7c.firebaseapp.com",
  projectId:"c-rm-85c7c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const state={data:[],view:[],editId:null};
const $=id=>document.getElementById(id);

/* CAPS */
document.querySelectorAll("input").forEach(i=>{
  i.addEventListener("input",()=>i.value=i.value.toUpperCase());
});

function setStatus(m){
 $("status").innerText=m;
 setTimeout(()=>$("status").innerText="",1500);
}

/* LOAD */
async function load(){
 const snap=await getDocs(collection(db,"contacts"));
 state.data=[];
 snap.forEach(d=>state.data.push({id:d.id,...d.data()}));
 state.view=[...state.data];
 render();
}

/* RENDER */
function render(){
 let html="";
 state.view.forEach(r=>{
 html+=`<tr>
<td>${r.carrier||""}</td>
<td>${r.location||""}</td>
<td>${r.pic||""}</td>

<td>${r.email||""}
<button class="icon-btn icon-copy" data-copy="${r.email||""}"><i class="bi bi-copy"></i></button>
</td>

<td>${r.contact||""}
<button class="icon-btn icon-copy" data-copy="${r.contact||""}"><i class="bi bi-copy"></i></button>
<button class="icon-btn icon-wa" data-wa="${r.contact||""}"><i class="bi bi-whatsapp"></i></button>
</td>

<td>${r.remarks||""}</td>

<td class="actions">
<button class="icon-btn icon-edit" data-edit="${r.id}"><i class="bi bi-pencil"></i></button>
<button class="icon-btn icon-del" data-del="${r.id}"><i class="bi bi-trash"></i></button>
<button class="icon-btn icon-dl" data-vcf="${r.id}"><i class="bi bi-download"></i></button>
</td>
</tr>`;
 });
 $("tbody").innerHTML=html;
}

/* EVENTS */
document.body.addEventListener("click",async e=>{
 const t=e.target.closest("button");
 if(!t) return;

 if(t.dataset.copy){
  navigator.clipboard.writeText(t.dataset.copy);
  setStatus("COPIED");
 }

 if(t.dataset.wa){
  const n=t.dataset.wa.replace(/\D/g,'');
  window.open(`https://wa.me/${n}`,"_blank");
 }

 if(t.dataset.edit){
  const r=state.data.find(x=>x.id===t.dataset.edit);
  Object.keys(r).forEach(k=>$(k)&&($(k).value=r[k]||""));
  state.editId=r.id;
 }

 if(t.dataset.del){
  await deleteDoc(doc(db,"contacts",t.dataset.del));
  load();
 }

 if(t.dataset.vcf){
  const r=state.data.find(x=>x.id===t.dataset.vcf);
  const v=`BEGIN:VCARD
FN:${r.pic}
ORG:${r.carrier}
TEL:${r.contact}
EMAIL:${r.email}
END:VCARD`;
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([v]));
  a.download="contact.vcf";
  a.click();
 }
});

/* SAVE */
$("btnSave").onclick=async()=>{
 const d={
  carrier:$("carrier").value,
  location:$("location").value,
  pic:$("pic").value,
  email:$("email").value,
  contact:$("contact").value,
  remarks:$("remarks").value
 };
 if(!d.carrier||!d.location){setStatus("REQUIRED");return;}
 await addDoc(collection(db,"contacts"),d);
 setStatus("SAVED");
 load();
};

/* UPDATE */
$("btnUpdate").onclick=async()=>{
 if(!state.editId){setStatus("SELECT RECORD");return;}
 const d={
  carrier:$("carrier").value,
  location:$("location").value,
  pic:$("pic").value,
  email:$("email").value,
  contact:$("contact").value,
  remarks:$("remarks").value
 };
 await updateDoc(doc(db,"contacts",state.editId),d);
 setStatus("UPDATED");
 load();
};

/* CLEAR */
$("btnClear").onclick=()=>location.reload();

/* EXCEL */
$("btnUploadExcel").onclick=()=>{
 const f=$("excelUpload").files[0];
 if(!f){setStatus("SELECT FILE");return;}
 const r=new FileReader();
 r.onload=async e=>{
  const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
  const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
  for(const row of rows){
   await addDoc(collection(db,"contacts"),{
    carrier:(row.CARRIER||"").toUpperCase(),
    location:(row.LOCATION||"").toUpperCase(),
    pic:(row.PIC||"").toUpperCase(),
    email:(row.EMAIL||"").toUpperCase(),
    contact:(row.CONTACT||""),
    remarks:(row.REMARKS||"").toUpperCase()
   });
  }
  setStatus("UPLOADED");
  load();
 };
 r.readAsArrayBuffer(f);
};

load();

</script>
</body>
</html>
