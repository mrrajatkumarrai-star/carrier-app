<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrier CRM Pro</title>

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
:root{
  --bg:#eef2f6;
  --glass:rgba(255,255,255,0.55);
  --border:#d6dde8;
  --text:#1f2937;
  --accent:#4b5563;
}

body{
  margin:0;
  font-family:Calibri, Arial;
  font-size:10pt;
  background:linear-gradient(135deg,#dde3ea,#f5f7fa);
  color:var(--text);
}

.header{
  background:#2f3542;
  color:white;
  padding:10px 14px;
  font-weight:600;
  letter-spacing:0.3px;
}

.container{
  padding:10px;
}

.card{
  background:var(--glass);
  backdrop-filter:blur(10px);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px;
  margin-bottom:10px;
}

input{
  height:24px;
  padding:4px 6px;
  border:1px solid #bfc7d3;
  border-radius:4px;
  margin:2px;
  outline:none;
}

button{
  height:26px;
  padding:4px 10px;
  border:none;
  background:#4b5563;
  color:white;
  border-radius:4px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

table{
  width:100%;
  border-collapse:collapse;
  background:white;
}

th,td{
  border:1px solid var(--border);
  padding:3px 6px;
  white-space:nowrap;
}

th{
  background:#e7ecf3;
  font-weight:600;
  cursor:pointer;
}

tbody tr:hover{
  background:#f1f5ff;
}

.actions{
  width:110px;
  text-align:center;
}

.icon-btn{
  background:none;
  border:none;
  cursor:pointer;
  font-size:14px;
  margin:0 2px;
}

.copy{color:#2563eb;}
.wa{color:#25D366;}
.edit{color:#374151;}
.delete{color:#dc2626;}

.status{
  font-size:9pt;
  margin-top:5px;
  color:#374151;
}

.topbar{
  display:flex;
  gap:5px;
  flex-wrap:wrap;
}

</style>
</head>

<body>

<div class="header">Carrier CRM Pro</div>

<div class="container">

<div class="card">

<div class="topbar">
<input id="carrier" placeholder="Carrier">
<input id="location" placeholder="Location">
<input id="pic" placeholder="PIC">
<input id="email" placeholder="Email">
<input id="contact" placeholder="Contact">
<input id="remarks" placeholder="Remarks">
</div>

<div class="topbar">
<button onclick="App.save()">Save</button>
<button onclick="App.update()">Update</button>
<button onclick="App.clear()">Clear</button>
<button onclick="App.exportAllVCF()">Export VCF</button>
</div>

<div id="status" class="status"></div>

</div>

<div class="card">

<div class="topbar">
<input placeholder="Search all..." onkeyup="App.search(this.value)">
<input placeholder="Carrier" onkeyup="App.filter(0,this.value)">
<input placeholder="Location" onkeyup="App.filter(1,this.value)">
<input placeholder="Contact" onkeyup="App.filter(4,this.value)">
</div>

</div>

<div class="card">

<table>
<thead>
<tr>
<th onclick="App.sort(0)">Carrier</th>
<th onclick="App.sort(1)">Location</th>
<th onclick="App.sort(2)">PIC</th>
<th onclick="App.sort(3)">Email</th>
<th onclick="App.sort(4)">Contact</th>
<th onclick="App.sort(5)">Remarks</th>
<th class="actions">Actions</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBy7H5e9924bwSMJmsDTLBfgeUu2ofsuKc",
  authDomain: "c-rm-85c7c.firebaseapp.com",
  projectId: "c-rm-85c7c",
  storageBucket: "c-rm-85c7c.appspot.com",
  messagingSenderId: "527591400910",
  appId: "1:527591400910:web:07289d3360072a2b53f79f"
};

const db = getFirestore(initializeApp(firebaseConfig));

const App = {

data:[],
filtered:[],
editId:null,

norm(v){return (v||"").toLowerCase().trim();},
phone(v){return (v||"").replace(/\D/g,'');},

status(msg){
  status.innerText = msg;
  setTimeout(()=>status.innerText="",2000);
},

async load(){
  const snap = await getDocs(collection(db,"contacts"));
  this.data = snap.docs.map(d=>({id:d.id,...d.data()}));
  this.filtered = this.data;
  this.render();
},

render(){
  table.innerHTML = this.filtered.map(r=>`
  <tr>
    <td>${r.carrier||""}</td>
    <td>${r.location||""}</td>
    <td>${r.pic||""}</td>

    <td>
      ${r.email||""}
      <button class="icon-btn copy" onclick="App.copy('${r.email}')">
        <i class="bi bi-copy"></i>
      </button>
    </td>

    <td>
      ${r.contact||""}
      <button class="icon-btn copy" onclick="App.copy('${r.contact}')">
        <i class="bi bi-copy"></i>
      </button>
      <button class="icon-btn wa" onclick="App.wa('${r.contact}')">
        <i class="bi bi-whatsapp"></i>
      </button>
    </td>

    <td>${r.remarks||""}</td>

    <td class="actions">
      <button class="icon-btn edit" onclick="App.edit('${r.id}')">
        <i class="bi bi-pencil"></i>
      </button>
      <button class="icon-btn delete" onclick="App.del('${r.id}')">
        <i class="bi bi-trash"></i>
      </button>
    </td>
  </tr>
  `).join("");
},

form(){
  return {
    carrier:carrier.value.trim(),
    location:location.value.trim(),
    pic:pic.value.trim(),
    email:email.value.trim(),
    contact:contact.value.trim(),
    remarks:remarks.value.trim()
  };
},

duplicate(d){
  return this.data.some(r =>
    this.norm(r.carrier)===this.norm(d.carrier) &&
    this.norm(r.location)===this.norm(d.location) &&
    this.phone(r.contact)===this.phone(d.contact)
  );
},

async save(){
  const d=this.form();
  if(!d.carrier || !d.location){
    this.status("Carrier & Location required");
    return;
  }
  if(this.duplicate(d)){
    this.status("Duplicate exists");
    return;
  }
  await addDoc(collection(db,"contacts"),d);
  this.clear();
  this.load();
  this.status("Saved");
},

async update(){
  if(!this.editId){this.status("Select record"); return;}
  const d=this.form();
  await updateDoc(doc(db,"contacts",this.editId),d);
  this.clear();
  this.load();
  this.status("Updated");
},

edit(id){
  const r=this.data.find(x=>x.id===id);
  this.editId=id;
  Object.entries(r).forEach(([k,v])=>{
    if(document.getElementById(k)) document.getElementById(k).value=v;
  });
},

async del(id){
  if(!confirm("Delete?")) return;
  await deleteDoc(doc(db,"contacts",id));
  this.load();
},

clear(){
  this.editId=null;
  ["carrier","location","pic","email","contact","remarks"].forEach(id=>{
    document.getElementById(id).value="";
  });
},

search(val){
  val=val.toLowerCase();
  this.filtered=this.data.filter(r=>
    Object.values(r).join(" ").toLowerCase().includes(val)
  );
  this.render();
},

filter(col,val){
  val=val.toLowerCase();
  const keys=["carrier","location","pic","email","contact","remarks"];
  this.filtered=this.data.filter(r=>
    (r[keys[col]]||"").toLowerCase().includes(val)
  );
  this.render();
},

sort(col){
  const keys=["carrier","location","pic","email","contact","remarks"];
  const k=keys[col];
  this.filtered.sort((a,b)=>(a[k]||"").localeCompare(b[k]||""));
  this.render();
},

copy(t){navigator.clipboard.writeText(t);},

wa(n){
  n=n.replace(/\D/g,'');
  window.open(`https://wa.me/${n}`);
},

exportAllVCF(){
  let v="";
  this.data.forEach(r=>{
    v+=`BEGIN:VCARD
VERSION:3.0
FN:${r.pic}
ORG:${r.carrier}
TEL:${r.contact}
EMAIL:${r.email}
END:VCARD\n`;
  });
  const blob=new Blob([v],{type:"text/vcard"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="contacts.vcf";
  a.click();
}

};

window.App=App;
App.load();

</script>

</body>
</html>
